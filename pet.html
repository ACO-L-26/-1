<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Pet</title>
<style>
:root {
  --bg: #1a1a2e;
  --surface: #16213e;
  --text: #e0e0e8;
  --text2: #8080a0;
  --accent: #ff6b9d;
  --accent2: #c44dff;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: transparent;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* Draggable area */
#drag-bar{
  -webkit-app-region: drag;
  height: 24px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
}

/* Main container */
.pet-container{
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Pixel Character */
.pixel-char{
  margin-top: 30px;
  position: relative;
  width: 80px;
  height: 80px;
  cursor: pointer;
  transition: transform .3s;
  image-rendering: pixelated;
}
.pixel-char:hover{transform: scale(1.15)}
.pixel-char:active{transform: scale(.95)}

/* Pixel art character using CSS box-shadow */
.char-body{
  position: absolute;
  width: 48px; height: 48px;
  background: #ff6b9d;
  border-radius: 2px;
  top: 8px; left: 16px;
  box-shadow:
    /* ear-like top decorations */
    -8px -12px 0 -4px #ff6b9d,
    8px -12px 0 -4px #ff6b9d,
    /* eyes */
    -12px 4px 0 2px #1a1a2e,
    12px 4px 0 2px #1a1a2e,
    /* eye shine */
    -14px 2px 0 4px #fff,
    10px 2px 0 4px #fff,
    /* mouth */
    0px 14px 0 2px #1a1a2e,
    /* blush */
    -20px 10px 0 2px #ff9dbc,
    20px 10px 0 2px #ff9dbc;
}

/* Headphones (when gaming) */
.headphones{
  display: none;
  position: absolute;
  width: 64px;
  height: 20px;
  top: -4px; left: 8px;
}
.char-body.gaming .headphones{display:block}
.headphones::before, .headphones::after{
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  background: #333;
  border-radius: 50%;
  border: 2px solid #555;
  top: 0;
}
.headphones::before{left: 0}
.headphones::after{right: 0}
.headphones .band{
  position: absolute;
  width: 36px; height: 4px;
  background: #555;
  top: 5px; left: 14px;
  border-radius: 2px;
}

/* Music note swirl (when listening) */
.notes{
  display: none;
  position: absolute;
  top: -20px; left: 0;
  font-size: 16px;
  animation: floatUp 1.5s ease-out infinite;
}
.char-body.listening .notes{display:block}
.notes:nth-child(2){left: 20px; animation-delay: .5s}
.notes:nth-child(3){left: 40px; animation-delay: 1s}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-30px) scale(.5)}
}

/* Bob animation */
@keyframes bob{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-4px)}
}
.char-body.idle{animation: bob 2s ease-in-out infinite}
.char-body.gaming{animation: bob .5s ease-in-out infinite}
.char-body.listening{animation: bob 1.2s ease-in-out infinite}

/* Chat Bubble */
.bubble{
  position: absolute;
  top: 100px;
  left: -80px;
  width: 240px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 14px;
  padding: 14px;
  font-size: .8rem;
  line-height: 1.4;
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  z-index: 50;
  cursor: pointer;
  transition: all .3s;
}
.bubble::after{
  content: '';
  position: absolute;
  top: -8px;
  left: 100px;
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-bottom: 8px solid var(--surface);
}
.bubble-top-msg{
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 4px;
  font-size: .85rem;
}
.bubble .context{color: var(--text2); font-size: .75rem; margin-bottom: 6px}

/* Recommendation mini cards */
.rec-mini{
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 6px;
  background: rgba(255,255,255,.03);
  transition: background .2s;
}
.rec-mini:hover{background: rgba(255,255,255,.08)}
.rec-mini img{width: 40px; height: 40px; border-radius: 4px; object-fit: cover}
.rec-mini .info{flex:1; min-width:0}
.rec-mini .name{font-size: .76rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.rec-mini .artist{font-size: .68rem; color: var(--text2)}
.rec-mini audio{width:100%;height:24px;margin-top:4px}
.rec-mini audio::-webkit-media-controls-panel{background:#2a2a40}

/* Collapsed state */
.pet-container.collapsed .bubble{display:none}
.pet-container.collapsed .pixel-char{margin-top: 30px}

/* Error/empty state */
.empty-state{text-align:center;color:var(--text2);padding:12px;font-size:.8rem}

/* Activity badge on character */
.activity-badge{
  position: absolute;
  bottom: -18px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,.7);
  color: var(--accent2);
  font-size: .55rem;
  padding: 2px 8px;
  border-radius: 8px;
  white-space: nowrap;
  font-weight: 600;
}

/* Streaming indicator */
.indicator{
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--accent);
  position: absolute;
  top: 28px; right: -2px;
  animation: pulse 1.5s ease-in-out infinite;
}
.indicator.game{background: #ff4444}
.indicator.music{background: #44ff44}
.indicator.idle{background: #888}
@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 4px currentColor}
  50%{opacity:.4;box-shadow:0 0 8px currentColor}
}

/* Loading spinner */
.spin{
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.1);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="drag-bar"></div>

<div class="pet-container" id="pet-container">
  <div class="pixel-char" id="pixel-char" onclick="Pet.onClick()" title="Music Pet">
    <div class="headphones">
      <div class="band"></div>
    </div>
    <div class="char-body idle" id="char-body">
      <div class="notes">♪</div>
      <div class="notes">♫</div>
      <div class="notes">♪</div>
    </div>
    <div class="indicator idle" id="indicator"></div>
    <div class="activity-badge" id="activity-badge">空闲中</div>
  </div>

  <div class="bubble" id="bubble" onclick="Pet.onBubbleClick()">
    <div class="bubble-top-msg" id="bubble-title">Music Pet</div>
    <div class="context" id="bubble-context"></div>
    <div id="bubble-recs"></div>
  </div>
</div>

<script>
// ===================== PET ENGINE =====================
const Pet = {
  state: 'loading', // idle, game, music, both
  activity: null,
  recs: [],
  pollingInterval: null,
  collapsed: false,

  init(){
    this.poll();
    this.pollingInterval = setInterval(() => this.poll(), 30000);
  },

  async poll(){
    this.setState('loading');
    try {
      const res = await fetch('/api/activity');
      const data = await res.json();
      this.activity = data.activity;
      this.updateCharacter(data.activity);
      this.updateBubble(data.message);
      await this.loadRecs(data.genres);
    } catch(e){
      console.error('Activity poll failed:', e);
      this.setState('idle');
      $('bubble-context').textContent = '连接中...';
    }
  },

  async loadRecs(genres){
    if(!genres || genres.length === 0) genres = ['Lo-fi', 'Chill'];
    const allTracks = [];

    // Search for 2-3 genres
    for(const genre of genres.slice(0, 3)){
      try {
        const res = await fetch(`/api/itunes/search?term=${encodeURIComponent(genre)}&entity=song&limit=5&country=cn`);
        const data = await res.json();
        if(data.results){
          for(const t of data.results){
            if(!allTracks.find(x=>x.trackId===t.trackId)){
              allTracks.push(t);
            }
          }
        }
      } catch(e){}
    }

    this.recs = allTracks.slice(0, 3);
    this.renderRecs();
  },

  updateCharacter(activity){
    const body = $('char-body');
    const indicator = $('indicator');
    const badge = $('activity-badge');

    body.classList.remove('idle','gaming','listening');

    if(activity.game && activity.music){
      body.classList.add('gaming');
      indicator.className = 'indicator game';
      badge.textContent = '游戏 + 听歌';
      this.setState('both');
    } else if(activity.game){
      body.classList.add('gaming');
      indicator.className = 'indicator game';
      badge.textContent = activity.game.name || '游戏中';
      this.setState('game');
    } else if(activity.music){
      body.classList.add('listening');
      indicator.className = 'indicator music';
      badge.textContent = '听歌中';
      this.setState('music');
    } else {
      body.classList.add('idle');
      indicator.className = 'indicator idle';
      badge.textContent = '空闲中';
      this.setState('idle');
    }
  },

  updateBubble(message){
    $('bubble-title').textContent = '♪ Music Pet';
    $('bubble-context').textContent = message || '点击我获取音乐推荐~';
  },

  renderRecs(){
    const container = $('bubble-recs');
    if(this.recs.length === 0){
      container.innerHTML = '<div class="empty-state"><span class="spin"></span> 搜索中...</div>';
      return;
    }
    container.innerHTML = this.recs.map(t => {
      const img = t.artworkUrl100 || '';
      const name = t.trackName || t.trackCensoredName || '';
      const artist = t.artistName || '';
      const preview = t.previewUrl || '';
      return `
        <div class="rec-mini">
          ${img ? `<img src="${img}" alt="" onerror="this.style.display='none'">` : ''}
          <div class="info">
            <div class="name">${esc(name)}</div>
            <div class="artist">${esc(artist)}</div>
            ${preview ? `<audio controls src="${preview}"><source src="${preview}" type="audio/mpeg"></audio>` : ''}
          </div>
        </div>`;
    }).join('');
  },

  setState(s){ this.state = s; },

  onClick(){
    // Click pet → refresh recommendations
    if(this.activity){
      const genres = getGenresForActivity(this.activity);
      this.loadRecs(genres);
    }
  },

  onBubbleClick(e){
    // Bubble click → refresh
    if(e.target.tagName === 'AUDIO' || e.target.closest('audio')) return;
    this.onClick();
  }
};

function getGenresForActivity(activity){
  const g = [];
  if(activity.game && activity.game.style){
    g.push(...activity.game.style.split(' '));
  }
  const h = new Date().getHours();
  if(h < 6 || h >= 22) g.push('Lo-fi','Ambient');
  else if(h < 10) g.push('Acoustic','Classical');
  else g.push('Electronic','Pop');
  return g;
}

function $(id){return document.getElementById(id)}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// Start
document.addEventListener('DOMContentLoaded', () => Pet.init());
</script>
</body>
</html>
