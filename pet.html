<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Pet — 桌宠音乐伴侣</title>
<style>
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #22223a;
  --text: #e8e8f0;
  --text2: #8888a8;
  --accent: #ff6b9d;
  --accent2: #c44dff;
  --green: #44dd88;
  --red: #ff5566;
  --radius: 12px;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ========= Header ========= */
header{
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,.06);
  padding: 12px 28px;
  display: flex;
  align-items: center;
  gap: 12px;
}
header .logo{font-size: 1.2rem; font-weight: 700; letter-spacing: -.3px}
header .logo span{color: var(--accent)}
header .status-dot{
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
header .status-text{font-size:.78rem;color:var(--text2);margin-left:auto}

/* ========= Main Layout ========= */
main{
  max-width: 900px;
  margin: 0 auto;
  padding: 24px 28px;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 24px;
  align-items: start;
}

/* ========= Left: Pet Character Panel ========= */
.pet-panel{
  background: var(--surface);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  position: sticky;
  top: 24px;
}

/* Pixel Character - Larger for PC */
.char-stage{
  position: relative;
  width: 160px;
  height: 180px;
  margin: 0 auto 16px;
}
.char-body{
  position: absolute;
  width: 72px; height: 72px;
  background: #ff6b9d;
  border-radius: 3px;
  top: 40px; left: 44px;
  box-shadow:
    /* ears */
    -10px -18px 0 -6px #ff6b9d,
    10px -18px 0 -6px #ff6b9d,
    /* eyes */
    -16px 8px 0 4px #1a1a2e,
    16px 8px 0 4px #1a1a2e,
    /* eye shine */
    -18px 4px 0 6px #fff,
    14px 4px 0 6px #fff,
    /* mouth */
    0px 20px 0 4px #1a1a2e,
    /* blush */
    -26px 14px 0 6px #ff9dbc,
    26px 14px 0 6px #ff9dbc,
    /* body */
    0px 44px 0 12px #ff6b9d;
  transition: transform .3s;
  cursor: pointer;
}
.char-body:hover{transform: scale(1.1)}
.char-body:active{transform: scale(.95)}

/* Headphones on gaming */
.headphones{
  display: none;
  position: absolute;
  width: 96px; height: 24px;
  top: 36px; left: 32px;
}
.char-body.gaming .headphones{display:block}
.headphones::before, .headphones::after{
  content:'';position:absolute;
  width:20px;height:20px;
  background:#333;border-radius:50%;
  border:3px solid #555;
  top:0;
}
.headphones::before{left:0}
.headphones::after{right:0}
.headphones .band{
  position:absolute;
  width:56px;height:6px;
  background:#555;
  top:7px;left:20px;
  border-radius:3px;
}

/* Floating notes when listening */
.notes{display:none;position:absolute;font-size:22px;top:16px}
.char-body.listening .notes{display:block}
.notes:nth-child(1){left:12px;animation:floatUp 1.5s ease-out infinite}
.notes:nth-child(2){left:44px;animation:floatUp 1.5s ease-out .5s infinite}
.notes:nth-child(3){left:76px;animation:floatUp 1.5s ease-out 1s infinite}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-36px) scale(.4)}
}

/* Bob */
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.char-body.idle{animation:bob 2s ease-in-out infinite}
.char-body.gaming{animation:bob .5s ease-in-out infinite}
.char-body.listening{animation:bob 1.2s ease-in-out infinite}

/* Status badge */
.status-badge{
  display: inline-block;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: .82rem;
  font-weight: 600;
  margin-bottom: 12px;
}
.status-badge.game{background:rgba(255,85,102,.15);color:var(--red)}
.status-badge.music{background:rgba(68,221,136,.15);color:var(--green)}
.status-badge.both{background:rgba(196,77,255,.15);color:var(--accent2)}
.status-badge.idle{background:var(--surface2);color:var(--text2)}

.pet-name{font-size:1rem;font-weight:700;margin-bottom:4px}
.pet-hint{font-size:.76rem;color:var(--text2)}

/* ========= Right: Content Panel ========= */
.content-panel{
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Activity card */
.card{
  background: var(--surface);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: var(--radius);
  padding: 20px 24px;
}
.card-title{
  font-size: .8rem;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text2);
  margin-bottom: 12px;
  font-weight: 700;
}

.activity-row{
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
}
.activity-item{
  flex: 1;
  min-width: 140px;
  background: var(--surface2);
  border-radius: 8px;
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.activity-item .icon{
  font-size: 1.6rem;
  width: 36px;
  text-align: center;
}
.activity-item .label{font-size:.72rem;color:var(--text2);margin-bottom:2px}
.activity-item .value{font-size:.92rem;font-weight:600}
.activity-item.active{border-left: 3px solid var(--accent)}

/* Music cards */
.rec-cards{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.rec-card{
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,.04);
  border-radius: 10px;
  padding: 16px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  transition: all .2s;
}
.rec-card:hover{border-color:rgba(255,255,255,.12);transform:translateY(-1px)}
.rec-card img{
  width: 64px; height: 64px;
  border-radius: 6px;
  object-fit: cover;
  flex-shrink: 0;
  background: var(--surface);
}
.rec-card .track-info{flex:1;min-width:0}
.rec-card .t-name{font-weight:700;font-size:.88rem;margin-bottom:2px}
.rec-card .t-artist{font-size:.78rem;color:var(--text2);margin-bottom:4px}
.rec-card .t-genre{
  font-size:.68rem;color:var(--accent2);
  background:rgba(196,77,255,.1);
  display:inline-block;padding:2px 8px;border-radius:8px;
  margin-bottom:6px;
}
.rec-card audio{width:100%;height:28px;margin-top:4px}
.rec-card audio::-webkit-media-controls-panel{background:var(--surface)}

/* Empty */
.empty{text-align:center;padding:32px;color:var(--text2)}
.empty .big-icon{font-size:3rem;margin-bottom:12px}
.spin{
  display:inline-block;width:18px;height:18px;
  border:2px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin .6s linear infinite;
  margin-right:8px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Refresh button */
.refresh-bar{
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.btn{
  padding: 8px 20px; border: none;
  border-radius: 20px;
  font-size: .82rem; font-weight: 600;
  cursor: pointer;
  transition: all .2s;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#ff85b0;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--text)}
.btn-outline:hover{border-color:var(--accent)}

.next-poll{font-size:.72rem;color:var(--text2)}

/* Compact for small desktop pet window */
@media(max-width:500px){
  main{display:block;padding:10px}
  .pet-panel{position:static;display:flex;align-items:center;gap:10px;padding:10px 14px;margin-bottom:10px;text-align:left;flex-direction:row}
  .char-stage{width:60px;height:60px;margin:0;flex-shrink:0}
  .char-body{width:36px;height:36px;top:12px;left:12px;box-shadow:-5px -8px 0 -3px #ff6b9d,5px -8px 0 -3px #ff6b9d,-8px 4px 0 2px #1a1a2e,8px 4px 0 2px #1a1a2e,-9px 2px 0 3px #fff,7px 2px 0 3px #fff,0px 10px 0 2px #1a1a2e,-12px 7px 0 3px #ff9dbc,12px 7px 0 3px #ff9dbc,0px 20px 0 6px #ff6b9d}
  .headphones{width:50px;height:12px;top:8px;left:5px}
  .headphones::before,.headphones::after{width:10px;height:10px;border-width:2px}
  .headphones .band{width:30px;height:3px;top:4px;left:10px}
  .notes{font-size:11px;top:-4px}
  .notes:nth-child(1){left:4px}.notes:nth-child(2){left:22px}.notes:nth-child(3){left:40px}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-20px)}}
  .pet-name{font-size:.8rem}.pet-hint,.status-badge{font-size:.68rem}
  .rec-cards{grid-template-columns:1fr}
  .card{padding:12px 14px}
  .card-title{font-size:.7rem}
  .rec-card img{width:48px;height:48px}
  .rec-card .t-name{font-size:.8rem}
  .activity-item{padding:8px 12px}
  .activity-item .icon{font-size:1.2rem;width:24px}
  .activity-item .value{font-size:.8rem}
  header{padding:8px 14px}
  header .logo{font-size:1rem}
  .refresh-bar{flex-direction:column;align-items:flex-start;gap:6px}
}
</style>
</head>
<body>

<header>
  <div class="logo"><span>♪</span> Music Pet</div>
  <div class="status-dot" id="header-dot"></div>
  <span style="font-size:.8rem" id="header-status">启动中...</span>
  <span class="status-text" id="header-time"></span>
</header>

<main>
  <!-- ===== Left: Pet Character ===== -->
  <aside class="pet-panel">
    <div class="char-stage">
      <div class="char-body idle" id="char-body">
        <div class="headphones"><div class="band"></div></div>
        <div class="notes">♪</div><div class="notes">♫</div><div class="notes">♪</div>
      </div>
    </div>
    <div class="status-badge idle" id="status-badge">空闲中</div>
    <div class="pet-name" id="pet-name">音符精灵</div>
    <div class="pet-hint" id="pet-hint">点击角色刷新推荐</div>
  </aside>

  <!-- ===== Right: Content ===== -->
  <div class="content-panel">
    <!-- Activity detection -->
    <div class="card">
      <div class="card-title">当前活动</div>
      <div class="activity-row" id="activity-row">
        <div class="activity-item">
          <div class="icon">🎮</div>
          <div>
            <div class="label">游戏</div>
            <div class="value" id="act-game">未检测到</div>
          </div>
        </div>
        <div class="activity-item">
          <div class="icon">🎵</div>
          <div>
            <div class="label">音乐</div>
            <div class="value" id="act-music">未检测到</div>
          </div>
        </div>
        <div class="activity-item">
          <div class="icon">🕐</div>
          <div>
            <div class="label">时段</div>
            <div class="value" id="act-time">--</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recommendations -->
    <div class="card">
      <div class="refresh-bar">
        <div class="card-title" style="margin-bottom:0" id="rec-title">为你推荐</div>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="next-poll" id="next-poll"></span>
          <button class="btn btn-outline" onclick="Pet.refresh()">刷新推荐</button>
        </div>
      </div>
      <p style="color:var(--text2);font-size:.8rem;margin-bottom:14px" id="rec-context"></p>
      <div class="rec-cards" id="rec-cards">
        <div class="empty">
          <div class="big-icon">🎧</div>
          <div><span class="spin"></span>检测活动中...</div>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
// ===================== PET ENGINE =====================
const Pet = {
  activity: null,
  recs: [],
  timer: null,
  countdown: 30,

  init(){
    this.poll();
    this.timer = setInterval(() => this.poll(), 30000);
    this._tickCountdown();
    setInterval(() => this._tickCountdown(), 1000);
    $('char-body').onclick = () => this.refresh();
    $('header-time').textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    setInterval(()=>{
      $('header-time').textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    },30000);
  },

  _tickCountdown(){
    this.countdown--;
    if(this.countdown <= 0) this.countdown = 30;
    $('next-poll').textContent = `${this.countdown}秒后自动刷新`;
  },

  async poll(){
    this.countdown = 30;
    this._setHeaderState('loading','检测中...', '#888');
    try {
      const res = await fetch('/api/activity');
      const data = await res.json();
      this.activity = data.activity;
      this._updateCharacter(data.activity);
      this._updateActivityCard(data.activity);
      $('rec-context').textContent = data.message || '';
      await this._loadRecs(data.genres);
      this._setHeaderState('ok','运行中', 'var(--green)');
    } catch(e){
      console.error(e);
      this._setHeaderState('error','服务器离线', 'var(--red)');
      $('rec-context').textContent = '无法连接服务器...';
    }
  },

  async refresh(){
    if(!this.activity) return this.poll();
    const genres = this._getGenresForActivity(this.activity);
    $('rec-cards').innerHTML = '<div class="empty"><span class="spin"></span>刷新中...</div>';
    await this._loadRecs(genres);
  },

  async _loadRecs(genres){
    if(!genres || genres.length === 0) genres = ['Lo-fi','Chill'];
    const all = [];
    for(const genre of genres.slice(0,4)){
      try {
        const res = await fetch(`/api/itunes/search?term=${encodeURIComponent(genre)}&entity=song&limit=6&country=cn`);
        const data = await res.json();
        if(data.results){
          for(const t of data.results){
            if(!all.find(x=>x.trackId===t.trackId)) all.push(t);
          }
        }
      } catch(e){}
    }
    this.recs = all.slice(0, 4);
    this._renderRecs();
  },

  _renderRecs(){
    const container = $('rec-cards');
    if(this.recs.length === 0){
      container.innerHTML = '<div class="empty"><div class="big-icon">🔍</div><div>暂无推荐</div></div>';
      return;
    }
    container.innerHTML = this.recs.map(t => {
      const img = (t.artworkUrl100||'').replace('100x100','200x200');
      const name = t.trackName || t.trackCensoredName || '';
      const artist = t.artistName || '';
      const genre = t.primaryGenreName || '';
      const preview = t.previewUrl || '';
      return `
        <div class="rec-card">
          ${img?`<img src="${img}" alt="" onerror="this.style.display='none'">`:'<div style="width:64px;height:64px;border-radius:6px;background:var(--surface);flex-shrink:0"></div>'}
          <div class="track-info">
            <div class="t-name">${esc(name)}</div>
            <div class="t-artist">${esc(artist)}</div>
            ${genre?`<span class="t-genre">${esc(genre)}</span>`:''}
            ${preview?`<audio controls src="${preview}"><source src="${preview}" type="audio/mpeg"></audio>`:''}
          </div>
        </div>`;
    }).join('');
  },

  _updateCharacter(activity){
    const body = $('char-body');
    const badge = $('status-badge');
    const name = $('pet-name');
    body.classList.remove('idle','gaming','listening');

    if(activity.game && activity.music){
      body.classList.add('gaming');
      badge.className = 'status-badge both';
      badge.textContent = '游戏 + 听歌';
      name.textContent = '战斗音符精灵';
    } else if(activity.game){
      body.classList.add('gaming');
      badge.className = 'status-badge game';
      badge.textContent = activity.game.name || '游戏中';
      name.textContent = '战斗音符精灵';
    } else if(activity.music){
      body.classList.add('listening');
      badge.className = 'status-badge music';
      badge.textContent = '听歌中';
      name.textContent = '摇摆音符精灵';
    } else {
      body.classList.add('idle');
      badge.className = 'status-badge idle';
      badge.textContent = '空闲中';
      name.textContent = '音符精灵';
    }
  },

  _updateActivityCard(activity){
    $('act-game').textContent = activity.game ? activity.game.name : '未检测到';
    $('act-music').textContent = activity.music || '未检测到';
    $('act-time').textContent = activity.timeOfDay || '--';

    // Highlight active items
    const items = document.querySelectorAll('.activity-item');
    items[0].classList.toggle('active', !!activity.game);
    items[1].classList.toggle('active', !!activity.music);
  },

  _setHeaderState(state, text, color){
    $('header-status').textContent = text;
    $('header-dot').style.background = color;
  },

  _getGenresForActivity(activity){
    const g = [];
    if(activity.game && activity.game.style) g.push(...activity.game.style.split(' '));
    const h = new Date().getHours();
    if(h<6||h>=22){g.push('Lo-fi','Ambient')}
    else if(h<10){g.push('Acoustic','Classical')}
    else{g.push('Electronic','Pop')}
    return g;
  }
};

function $(id){return document.getElementById(id)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.addEventListener('DOMContentLoaded',()=>Pet.init());
</script>
</body>
</html>
