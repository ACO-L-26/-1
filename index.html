<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Discovery Engine</title>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #14141f;
  --surface2: #1e1e2e;
  --text: #e0e0e8;
  --text2: #9090a8;
  --accent: #fa586a;
  --accent2: #ff7a88;
  --border: #2a2a3a;
  --radius: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
}

header{
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo{font-size:1.3rem;font-weight:700;display:flex;align-items:center;gap:8px}
.logo em{color:var(--accent);font-style:normal}
.logo small{color:var(--text2);font-size:.7rem;font-weight:400}

.btn{
  padding: 10px 20px;border:none;border-radius:24px;
  font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn-outline:hover{border-color:var(--text2)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

main{max-width:1000px;margin:0 auto;padding:24px}

.step{display:none}
.step.active{display:block}

.steps-bar{display:flex;gap:4px;margin-bottom:32px}
.steps-bar .dot{flex:1;height:4px;border-radius:2px;background:var(--surface2);transition:background .3s}
.steps-bar .dot.done{background:var(--accent)}
.steps-bar .dot.current{background:var(--accent2)}

h2{font-size:1.5rem;margin-bottom:8px}
.subtitle{color:var(--text2);margin-bottom:20px;font-size:.92rem}

/* Input Grid */
.input-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.input-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.input-card .num{font-size:.75rem;color:var(--accent);font-weight:700;margin-bottom:6px}
.input-card input{
  width:100%;background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:8px 10px;color:var(--text);font-size:.88rem;outline:none;transition:border .2s;
}
.input-card input:focus{border-color:var(--accent)}

/* Search Results */
.search-results{display:flex;flex-direction:column;gap:6px}
.search-result{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .15s;
}
.search-result:hover{border-color:var(--accent)}
.search-result.selected{border-color:var(--accent);background:rgba(250,88,106,.1)}
.search-result img{width:40px;height:40px;border-radius:3px;object-fit:cover;background:var(--surface);flex-shrink:0}
.search-result .info{flex:1;min-width:0}
.search-result .name{font-weight:600;font-size:.84rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.search-result .artist{color:var(--text2);font-size:.75rem}
.search-result .genre{color:var(--text2);font-size:.68rem}
.search-result .check{color:var(--accent);font-size:1rem;display:none;flex-shrink:0}
.search-result.selected .check{display:block}

.selected-track{
  display:flex;align-items:center;gap:8px;
  background:rgba(250,88,106,.1);border:1px solid var(--accent);
  padding:8px 12px;border-radius:8px;margin-top:8px;
}
.selected-track img{width:32px;height:32px;border-radius:3px;object-fit:cover}
.selected-track .name{font-weight:600;font-size:.85rem}
.selected-track .artist{color:var(--text2);font-size:.75rem}
.selected-track .clear-btn{margin-left:auto;color:var(--text2);cursor:pointer;font-size:.85rem}
.selected-track .clear-btn:hover{color:var(--accent)}

/* Rec Cards */
.rec-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.rec-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:20px;text-align:center;
  cursor:pointer;transition:all .2s;position:relative;
}
.rec-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.rec-card.picked{border-color:var(--accent);background:rgba(250,88,106,.08)}
.rec-card img{width:100px;height:100px;border-radius:6px;object-fit:cover;margin-bottom:12px;background:var(--surface2)}
.rec-card .track-name{font-weight:700;margin-bottom:4px;font-size:.92rem}
.rec-card .track-artist{color:var(--text2);font-size:.8rem;margin-bottom:4px}
.rec-card .track-genre{color:var(--text2);font-size:.72rem;margin-bottom:8px}
.rec-card .score{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.72rem;color:var(--text2);margin-bottom:6px}
.rec-card .score-hi{color:var(--accent2);font-weight:700;background:var(--surface2)}
.rec-card .reason{font-size:.7rem;color:var(--accent);margin-bottom:8px}
.rec-card .badge{position:absolute;top:10px;right:10px;background:var(--accent);color:#fff;font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:10px}
.rec-card audio{width:100%;height:32px;margin-bottom:8px;border-radius:16px}

/* Cycle */
.cycle-info{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.cycle-badge{background:var(--accent);color:#fff;font-weight:700;padding:6px 16px;border-radius:20px;font-size:.88rem}

/* Genres bar */
.genre-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.genre-tag{font-size:.75rem;padding:4px 12px;border-radius:14px;background:var(--surface2);color:var(--text2)}
.genre-tag strong{color:var(--text)}

/* Final Table */
.final-table{width:100%;border-collapse:collapse;margin-top:16px;font-size:.85rem}
.final-table th{
  background:var(--surface);text-align:left;padding:12px 14px;
  border-bottom:2px solid var(--border);font-weight:700;color:var(--text2);
  font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;
}
.final-table td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top}
.final-table tr:hover td{background:var(--surface2)}
.final-table .track-cell{display:flex;align-items:center;gap:8px}
.final-table .track-cell img{width:32px;height:32px;border-radius:3px;object-fit:cover}
.final-table .rec-list{display:flex;flex-direction:column;gap:3px}

.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200}
.loading-box{background:var(--surface);border-radius:var(--radius);padding:32px 40px;text-align:center}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);padding:12px 24px;border-radius:24px;font-size:.88rem;box-shadow:var(--shadow);z-index:300}

/* Weight modal */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);
  display:flex;align-items:center;justify-content:center;z-index:250;
}
.modal-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:28px 32px;
  max-width:500px;width:90%;
}
.modal-box h3{font-size:1.1rem;margin-bottom:6px}
.modal-box .modal-sub{color:var(--text2);font-size:.85rem;margin-bottom:18px}
.modal-seeds{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.modal-seed{
  display:flex;align-items:center;gap:10px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .15s;
}
.modal-seed:hover{border-color:var(--accent);background:rgba(250,88,106,.08)}
.modal-seed img{width:36px;height:36px;border-radius:3px;object-fit:cover}
.modal-seed .info{flex:1}
.modal-seed .info .sname{font-weight:600;font-size:.85rem}
.modal-seed .info .sartist{color:var(--text2);font-size:.75rem}
.modal-seed .weight-badge{
  font-size:.7rem;padding:2px 8px;border-radius:10px;
  background:var(--border);color:var(--text2);
}
.modal-seed .weight-badge.boosted{background:var(--accent);color:#fff}

@media(max-width:700px){.rec-cards{grid-template-columns:1fr}.input-grid{grid-template-columns:1fr}}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <em>♪</em> Music Discovery
    <small>Powered by iTunes</small>
  </div>
</header>

<main>
  <div class="steps-bar" id="steps-bar">
    <div class="dot current" data-step="0"></div>
    <div class="dot" data-step="1"></div>
    <div class="dot" data-step="2"></div>
  </div>

  <section class="step active" id="step-search">
    <h2>输入 5 首你喜欢的歌曲</h2>
    <p class="subtitle">输入歌名搜索，从候选列表中选择</p>
    <div class="input-grid" id="input-grid"></div>
    <button class="btn btn-primary" id="btn-analyze" disabled onclick="App.startRecommendations()">
      开始分析推荐
    </button>
  </section>

  <section class="step" id="step-recommend">
    <div class="cycle-info">
      <span class="cycle-badge" id="cycle-badge">第 1 / 5 轮</span>
      <span style="color:var(--text2);font-size:.88rem" id="pool-info"></span>
    </div>
    <h2>为你推荐的歌曲</h2>
    <p class="subtitle">分析种子歌曲的艺人和流派，从关联歌曲中匹配推荐</p>
    <div class="genre-bar" id="genre-bar"></div>
    <div class="rec-cards" id="rec-cards"></div>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn btn-outline" id="btn-retry" onclick="App.showWeightDialog()" style="display:none">
        不满意，调整权重重新推荐
      </button>
    </div>
  </section>

  <section class="step" id="step-final">
    <h2>推荐结果总览</h2>
    <p class="subtitle">5轮迭代推荐完成</p>
    <div style="overflow-x:auto">
      <table class="final-table" id="final-table"></table>
    </div>
    <div style="margin-top:20px;display:flex;gap:10px">
      <button class="btn btn-primary" onclick="App.reset()">重新开始</button>
      <button class="btn btn-outline" onclick="App.exportCSV()">导出 CSV</button>
    </div>
  </section>
</main>

<div class="loading-overlay" id="loading" style="display:none">
  <div class="loading-box">
    <div class="spinner" style="width:32px;height:32px;border-width:3px;margin-bottom:12px"></div>
    <p style="color:var(--text2)" id="loading-text">加载中...</p>
  </div>
</div>
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="App.closeWeightDialog(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <h3>你更喜欢哪首初始歌曲？</h3>
    <p class="modal-sub">选择一首，该歌曲的流派和艺人在重新匹配时权重+50%</p>
    <div class="modal-seeds" id="modal-seeds"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="App.closeWeightDialog()">取消</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
// ===================== UTILS =====================
function $(id){return document.getElementById(id)}
function showLoading(msg){$('loading').style.display='flex';$('loading-text').textContent=msg||'加载中...'}
function hideLoading(){$('loading').style.display='none'}
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;$('toast-container').appendChild(t);setTimeout(()=>t.remove(),2500)}

// ===================== iTUNES API =====================
const iTunes = {
  _base: 'https://itunes.apple.com',

  async _get(path){
    const url = this._base + path;
    console.log('[iTunes] GET', url);
    const res = await fetch(url);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  },

  async searchTracks(query, limit=5){
    const data = await this._get(
      `/search?term=${encodeURIComponent(query)}&entity=song&limit=${limit}&country=cn`
    );
    return data.results || [];
  },

  async lookupArtistSongs(artistId, limit=25){
    const data = await this._get(
      `/lookup?id=${artistId}&entity=song&limit=${limit}&country=cn`
    );
    return data.results || [];
  },

  async lookupTrack(trackId){
    const data = await this._get(`/lookup?id=${trackId}&country=cn`);
    return (data.results && data.results[0]) || null;
  },

  async searchByGenre(genre, limit=15){
    const data = await this._get(
      `/search?term=${encodeURIComponent(genre)}&entity=song&limit=${limit}&country=cn`
    );
    return data.results || [];
  },

  async searchArtistsInGenre(genre, limit=5){
    const data = await this._get(
      `/search?term=${encodeURIComponent(genre)}&entity=musicArtist&limit=${limit}&country=cn`
    );
    return data.results || [];
  }
};

// ===================== APP =====================
const App = {
  searchSelects: Array(5).fill(null),
  _searchCache: Array(5).fill(null),
  seedPool: [],
  originalSeeds: [],
  currentRecs: [],
  cycleResults: [],
  currentCycle: 0,
  totalCycles: 5,
  seedWeights: {},

  init(){
    this.renderSearchInputs();
    this.updateStepBar(0);
  },

  updateStepBar(step){
    document.querySelectorAll('#steps-bar .dot').forEach((d,i)=>{
      d.classList.remove('done','current');
      if(i<step)d.classList.add('done');
      if(i===step)d.classList.add('current');
    });
  },

  // ------ Search ------
  renderSearchInputs(){
    $('input-grid').innerHTML = '';
    for(let i=0;i<5;i++){
      const card = document.createElement('div');
      card.className = 'input-card';
      card.innerHTML = `
        <div class="num">歌曲 ${i+1}</div>
        <input type="text" placeholder="歌名 + 歌手名..."
               id="search-input-${i}"
               oninput="App.onSearchInput(${i},this.value)"
               onfocus="App.onSearchFocus(${i})">
        <div id="search-results-${i}" style="margin-top:8px"></div>
        <div id="search-selected-${i}"></div>
      `;
      $('input-grid').appendChild(card);
    }
    this.checkAllSelected();
  },

  onSearchFocus(idx){
    for(let i=0;i<5;i++)if(i!==idx)$('search-results-'+i).innerHTML='';
  },

  _searchTimers: Array(5).fill(null),

  onSearchInput(idx, query){
    if(query.length < 2){$('search-results-'+idx).innerHTML='';this._searchCache[idx]=null;return}
    if(this._searchTimers[idx])clearTimeout(this._searchTimers[idx]);
    this._searchTimers[idx] = setTimeout(()=>this._doSearch(idx,query), 350);
  },

  async _doSearch(idx, query){
    try {
      const tracks = await iTunes.searchTracks(query);
      this._searchCache[idx] = tracks;
      this.renderSearchResults(idx, tracks);
    } catch(e){
      console.error(e);
      $('search-results-'+idx).innerHTML =
        `<div style="color:var(--accent);font-size:.8rem;padding:8px">搜索失败: ${e.message}</div>`;
    }
  },

  renderSearchResults(idx, tracks){
    const container = $('search-results-'+idx);
    container.innerHTML = tracks.map(t=>{
      const sel = this.searchSelects[idx] && this.searchSelects[idx].trackId === t.trackId;
      const img = t.artworkUrl60 || t.artworkUrl100 || '';
      return `
        <div class="search-result ${sel?'selected':''}" onclick="App.selectSearchResult(${idx},${t.trackId})">
          ${img?`<img src="${img}" alt="" onerror="this.style.background='var(--surface)'">`:'<div style="width:40px;height:40px;border-radius:3px;background:var(--surface);flex-shrink:0"></div>'}
          <div class="info">
            <div class="name">${this._esc(t.trackName||t.trackCensoredName)}</div>
            <div class="artist">${this._esc(t.artistName)}${t.collectionName?` · ${this._esc(t.collectionName)}`:''}</div>
            ${t.primaryGenreName?`<div class="genre">${this._esc(t.primaryGenreName)}</div>`:''}
          </div>
          <div class="check">✓</div>
        </div>`;
    }).join('');
  },

  selectSearchResult(idx, trackId){
    const cached = this._searchCache[idx];
    if(!cached)return;
    const t = cached.find(r=>r.trackId===trackId);
    if(!t)return;
    this.searchSelects[idx] = {
      trackId: t.trackId,
      name: t.trackName||t.trackCensoredName,
      artist: t.artistName,
      artistId: t.artistId,
      genre: t.primaryGenreName||'',
      album: t.collectionName||'',
      artwork: (t.artworkUrl100||t.artworkUrl60||'').replace('100x100','300x300'),
      preview: t.previewUrl||''
    };
    this.renderSearchResults(idx, cached);
    this.showSelectedTrack(idx);
    this.checkAllSelected();
  },

  showSelectedTrack(idx){
    const sel = this.searchSelects[idx];
    const c = $('search-selected-'+idx);
    if(!sel){c.innerHTML='';return}
    c.innerHTML = `
      <div class="selected-track">
        ${sel.artwork?`<img src="${sel.artwork}" alt="">`:''}
        <span class="name">${this._esc(sel.name)}</span>
        <span class="artist">${this._esc(sel.artist)}${sel.genre?` · ${this._esc(sel.genre)}`:''}</span>
        <span class="clear-btn" onclick="event.stopPropagation();App.clearSelection(${idx})">✕</span>
      </div>`;
  },

  clearSelection(idx){
    this.searchSelects[idx]=null;
    this.showSelectedTrack(idx);
    if(this._searchCache[idx])this.renderSearchResults(idx, this._searchCache[idx]);
    this.checkAllSelected();
  },

  checkAllSelected(){
    $('btn-analyze').disabled=!this.searchSelects.every(s=>s!==null);
  },

  // ------ Recommendations ------
  async startRecommendations(){
    if(!this.searchSelects.every(s=>s))return;
    this.seedPool = this.searchSelects.map(s=>({...s}));
    this.originalSeeds = [...this.seedPool];
    this.cycleResults = [];
    this.currentCycle = 0;
    // Initialize weights for original 5 seeds (1.0 = default)
    this.seedWeights = {};
    this.originalSeeds.forEach(s => { this.seedWeights[s.trackId] = 1.0; });
    this.showStep('recommend');
    this._showGenreBar();
    await this.runCycle();
  },

  _showGenreBar(){
    const genres = {};
    this.seedPool.forEach(s=>{
      if(s.genre){genres[s.genre]=(genres[s.genre]||0)+1}
    });
    $('genre-bar').innerHTML = Object.entries(genres)
      .sort((a,b)=>b[1]-a[1])
      .map(([g,n])=>`<span class="genre-tag"><strong>${this._esc(g)}</strong> ×${n}</span>`)
      .join('');
  },

  async runCycle(){
    if(this.currentCycle >= this.totalCycles){
      this.showFinalResults();
      return;
    }

    this.currentCycle++;
    $('cycle-badge').textContent=`第 ${this.currentCycle} / ${this.totalCycles} 轮`;
    $('pool-info').textContent=`种子池: ${this.seedPool.length} 首`;
    $('btn-retry').style.display = 'none';
    this.updateStepBar(1);

    showLoading(`第 ${this.currentCycle} 轮推荐中...`);

    try {
      const seeds = this.seedPool.slice(-5);
      const recs = await this._getRecommendations(seeds);
      this.currentRecs = recs;
      this.renderRecommendations(recs);
    } catch(e){
      console.error(e);
      toast('推荐失败: '+e.message);
    }
    hideLoading();
  },

  async _getRecommendations(seeds){
    // Track ALL tracks ever shown or selected to prevent repeats
    const allSeenIds = new Set(this.seedPool.map(s=>s.trackId));
    this.cycleResults.forEach(cr => {
      cr.recs.forEach(r => { if(r.trackId) allSeenIds.add(r.trackId); });
    });

    // ===== 1. Get tracks from seed artists (25 each, up to 20 used) =====
    const artistTrackMap = new Map();
    const fetchPromises = [];
    for(const seed of seeds){
      if(artistTrackMap.has(seed.artistId)) continue;
      const p = iTunes.lookupArtistSongs(seed.artistId, 25).then(results => {
        const tracks = (results||[]).filter(r =>
          r.wrapperType === 'track' && !allSeenIds.has(r.trackId)
        );
        if(tracks.length > 0){
          artistTrackMap.set(seed.artistId, {artist: seed.artist, tracks: tracks.slice(0, 20)});
        }
      }).catch(e => console.warn('Artist lookup failed for', seed.artist, e));
      fetchPromises.push(p);
    }
    await Promise.all(fetchPromises);

    // ===== 2. Build weighted genre/artist profiles =====
    const genreWeight = {};
    let totalGenreWeight = 0;
    this.seedPool.forEach(s=>{
      if(s.genre){
        const w = this.seedWeights[s.trackId] || 1.0;
        genreWeight[s.genre] = (genreWeight[s.genre]||0) + w;
        totalGenreWeight += w;
      }
    });

    const artistWeight = {};
    let totalArtistWeight = 0;
    seeds.forEach(s=>{
      const w = this.seedWeights[s.trackId] || 1.0;
      artistWeight[s.artistId] = (artistWeight[s.artistId]||0) + w;
      totalArtistWeight += w;
    });

    // ===== 3. Score artist tracks =====
    const candidates = [];
    for(const [artistId, data] of artistTrackMap){
      for(const t of data.tracks){
        const trackGenre = t.primaryGenreName||'';
        const genreMatch = genreWeight[trackGenre] || 0;
        const artistMatch = artistWeight[artistId] || 0;
        const score = Math.min(100, Math.round(
          (genreMatch / Math.max(1, totalGenreWeight)) * 60 +
          (artistMatch / Math.max(1, totalArtistWeight)) * 40
        ));
        candidates.push({
          trackId: t.trackId, name: t.trackName||t.trackCensoredName||'',
          artist: t.artistName||'',
          artwork: (t.artworkUrl100||'').replace('100x100','300x300'),
          preview: t.previewUrl||'', genre: trackGenre,
          album: t.collectionName||'', score, viaArtist: data.artist
        });
      }
    }

    // ===== 4. Genre-based discovery: search top 3 genres + fetch similar artists =====
    const topGenres = Object.entries(genreWeight)
      .sort((a,b)=>b[1]-a[1])
      .slice(0, 3);

    const genreFetchPromises = [];
    for(const [genreName] of topGenres){
      // Search popular tracks in this genre
      const p1 = iTunes.searchByGenre(genreName, 15).then(results => {
        for(const t of (results||[])){
          if(allSeenIds.has(t.trackId)) continue;
          if(candidates.find(c=>c.trackId===t.trackId)) continue;
          const gMatch = genreWeight[t.primaryGenreName||''] || 0;
          candidates.push({
            trackId: t.trackId, name: t.trackName||t.trackCensoredName||'',
            artist: t.artistName||'',
            artwork: (t.artworkUrl100||'').replace('100x100','300x300'),
            preview: t.previewUrl||'', genre: t.primaryGenreName||'',
            album: t.collectionName||'',
            score: 25 + Math.min(30, Math.round((gMatch/Math.max(1,totalGenreWeight))*30)),
            viaArtist: '流派: '+genreName
          });
        }
      }).catch(()=>{});
      genreFetchPromises.push(p1);

      // Also find artists in this genre, then get their songs
      const p2 = iTunes.searchArtistsInGenre(genreName, 4).then(async artists => {
        for(const a of (artists||[])){
          if(artistTrackMap.has(a.artistId)) continue; // skip already-fetched artists
          try {
            const results = await iTunes.lookupArtistSongs(a.artistId, 10);
            const tracks = (results||[]).filter(r =>
              r.wrapperType === 'track' && !allSeenIds.has(r.trackId)
            );
            for(const t of tracks.slice(0, 8)){
              if(candidates.find(c=>c.trackId===t.trackId)) continue;
              const gMatch = genreWeight[t.primaryGenreName||''] || 0;
              candidates.push({
                trackId: t.trackId, name: t.trackName||t.trackCensoredName||'',
                artist: t.artistName||'',
                artwork: (t.artworkUrl100||'').replace('100x100','300x300'),
                preview: t.previewUrl||'', genre: t.primaryGenreName||'',
                album: t.collectionName||'',
                score: 20 + Math.min(35, Math.round((gMatch/Math.max(1,totalGenreWeight))*35)),
                viaArtist: '同流派: '+a.artistName
              });
            }
          } catch(e){}
        }
      }).catch(()=>{});
      genreFetchPromises.push(p2);
    }
    await Promise.all(genreFetchPromises);

    // ===== 5. Deduplicate, shuffle within score bands, pick top 3 =====
    const seen = new Set();
    const unique = candidates.filter(c=>{
      if(seen.has(c.trackId)) return false;
      seen.add(c.trackId);
      return true;
    });

    // Sort by score
    unique.sort((a,b)=>b.score-a.score);

    // Shuffle within score bands for diversity (tracks with similar scores get randomized order)
    function shuffleBand(arr, start, end){
      for(let i=end-1; i>start; i--){
        const j = start + Math.floor(Math.random() * (i-start+1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    // Group by score bands (every 10 points) and shuffle within each band
    for(let i=0; i<unique.length; ){
      const band = Math.floor(unique[i].score / 10);
      let j = i;
      while(j < unique.length && Math.floor(unique[j].score / 10) === band) j++;
      if(j - i > 3) shuffleBand(unique, i, j); // only shuffle if >3 in band
      i = j;
    }

    // Take top 3, ensuring at least one from genre discovery if available
    const result = unique.slice(0, 3);
    return result;
  },

  renderRecommendations(tracks){
    const container = $('rec-cards');
    container.innerHTML = tracks.map((t,i)=>{
      const hi = t.score >= 60 ? 'score-hi' : '';
      return `
        <div class="rec-card" id="rec-card-${i}">
          <div class="badge">#${i+1}</div>
          ${t.artwork?`<img src="${t.artwork}" alt="" onerror="this.style.display='none'">`:'<div style="width:100px;height:100px;border-radius:6px;background:var(--surface2);margin:0 auto 12px;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--text2)">♪</div>'}
          <div class="track-name">${this._esc(t.name)}</div>
          <div class="track-artist">${this._esc(t.artist)}</div>
          ${t.genre?`<div class="track-genre">${this._esc(t.genre)}</div>`:''}
          <div class="score ${hi}">匹配度: ${t.score}%</div>
          <div class="reason">来源: ${this._esc(t.viaArtist)}</div>
          ${t.preview?`<audio controls src="${t.preview}"><source src="${t.preview}" type="audio/mpeg"></audio>`:'<div style="color:var(--text2);font-size:.7rem;margin:4px 0">无试听</div>'}
          <button class="btn btn-primary" onclick="App.pickSong(${i})" style="width:100%;margin-top:6px">选这首 ♪</button>
        </div>`;
    }).join('');
    $('btn-retry').style.display = 'block';
  },

  async pickSong(idx){
    const picked = this.currentRecs[idx];
    if(!picked)return;

    const pickedTrack = {
      trackId: picked.trackId, name: picked.name, artist: picked.artist,
      artwork: picked.artwork, preview: picked.preview,
      genre: picked.genre, score: picked.score, viaArtist: picked.viaArtist
    };

    this.cycleResults.push({
      cycle: this.currentCycle,
      recs: this.currentRecs.map(t=>({
        trackId: t.trackId, name: t.name, artist: t.artist,
        score: t.score, artwork: t.artwork
      })),
      picked: pickedTrack
    });

    // Get full track info (especially artistId for future cycles)
    let artistId = null;
    try {
      const info = await iTunes.lookupTrack(picked.trackId);
      if(info) artistId = info.artistId;
    } catch(e){}

    this.seedPool.push({
      trackId: picked.trackId, name: picked.name, artist: picked.artist,
      artistId: artistId || picked.trackId,
      genre: picked.genre, artwork: picked.artwork
    });
    this._showGenreBar();

    document.querySelectorAll('.rec-card').forEach(c=>c.classList.remove('picked'));
    const card = document.getElementById('rec-card-'+idx);
    if(card)card.classList.add('picked');
    document.querySelectorAll('.rec-card button').forEach(b=>b.disabled=true);

    toast(`已选择: ${pickedTrack.name}`);
    setTimeout(()=>this.runCycle(), 1000);
  },

  // ------ Weight Adjustment ------
  showWeightDialog(){
    const overlay = document.getElementById('modal-overlay');
    const seedsContainer = document.getElementById('modal-seeds');

    seedsContainer.innerHTML = this.originalSeeds.map(s => {
      const w = this.seedWeights[s.trackId] || 1.0;
      const boosted = w > 1.0;
      return `
        <div class="modal-seed" onclick="App.applyWeight(${s.trackId})">
          ${s.artwork?`<img src="${s.artwork}" alt="">`:''}
          <div class="info">
            <div class="sname">${this._esc(s.name)}</div>
            <div class="sartist">${this._esc(s.artist)} · ${this._esc(s.genre||'')}</div>
          </div>
          <span class="weight-badge ${boosted?'boosted':''}">权重 ×${w.toFixed(1)}</span>
        </div>`;
    }).join('');

    overlay.style.display = 'flex';
  },

  closeWeightDialog(e){
    if(e && e.target !== document.getElementById('modal-overlay')) return;
    document.getElementById('modal-overlay').style.display = 'none';
  },

  async applyWeight(trackId){
    // Increase weight of selected seed by 50%
    this.seedWeights[trackId] = (this.seedWeights[trackId] || 1.0) + 0.5;
    document.getElementById('modal-overlay').style.display = 'none';
    $('btn-retry').style.display = 'none';

    toast(`已调整权重: ×${this.seedWeights[trackId].toFixed(1)}，重新匹配中...`);

    // Re-run recommendations for current cycle with updated weights
    this.currentCycle--;
    await this.runCycle();
  },

  // ------ Final ------
  showFinalResults(){
    this.showStep('final');
    this.updateStepBar(2);

    const tbody = $('final-table');
    let html = `<thead><tr>
      <th>轮次</th><th>该轮3首推荐</th><th>你选择的歌曲</th><th>匹配度 / 来源</th>
    </tr></thead><tbody>`;

    this.cycleResults.forEach(r=>{
      html += `<tr>
        <td><strong>第 ${r.cycle} 轮</strong></td>
        <td><div class="rec-list">${r.recs.map(rec=>`
          <span>${this._esc(rec.name)} — ${this._esc(rec.artist)} <small style="color:var(--text2)">(${rec.score}%)</small></span>
        `).join('')}</div></td>
        <td>
          <div class="track-cell">
            ${r.picked.artwork?`<img src="${r.picked.artwork}" alt="">`:''}
            <div>
              <strong>${this._esc(r.picked.name)}</strong><br>
              <small style="color:var(--text2)">${this._esc(r.picked.artist)}</small>
              ${r.picked.genre?`<br><small style="color:var(--text2)">${this._esc(r.picked.genre)}</small>`:''}
            </div>
          </div>
        </td>
        <td style="font-size:.8rem">
          匹配度: <strong>${r.picked.score}%</strong><br>
          来源: ${this._esc(r.picked.viaArtist)}
        </td>
      </tr>`;
    });

    html += `</tbody>
    <tfoot><tr style="background:var(--surface)">
      <td colspan="4" style="text-align:center;color:var(--text2);font-size:.8rem">
        初始种子: ${this.originalSeeds.map(s=>this._esc(s.name+' - '+s.artist)).join(' | ')}
      </td>
    </tr></tfoot>`;

    tbody.innerHTML = html;
  },

  showStep(name){
    document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));
    const map={search:'step-search',recommend:'step-recommend',final:'step-final'};
    const el=$(map[name]);
    if(el)el.classList.add('active');
  },

  reset(){
    this.searchSelects=Array(5).fill(null);
    this.seedPool=[];this.originalSeeds=[];
    this.currentRecs=[];this.cycleResults=[];
    this.currentCycle=0;
    this.seedWeights={};
    this._searchCache=Array(5).fill(null);
    $('btn-retry').style.display='none';
    this.showStep('search');
    this.updateStepBar(0);
    this.renderSearchInputs();
  },

  exportCSV(){
    let csv='轮次,推荐1,推荐2,推荐3,选中歌曲,选中歌手,匹配度,来源\n';
    this.cycleResults.forEach(r=>{
      csv+=[r.cycle,
        `"${r.recs[0]?.name||''}"`,`"${r.recs[1]?.name||''}"`,`"${r.recs[2]?.name||''}"`,
        `"${r.picked.name}"`,`"${r.picked.artist}"`,r.picked.score+'%',`"${r.picked.viaArtist}"`
      ].join(',')+'\n';
    });
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='recommendations.csv';
    a.click();
    toast('CSV 已下载');
  },

  _esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
};

document.addEventListener('DOMContentLoaded', ()=>App.init());
</script>
</body>
</html>
